services:
  backend:
    image: ${DOCKERHUB_USERNAME:-mohitkumar2007}/vehicle-service-backend:${IMAGE_TAG:-latest}
    env_file:
      - .env
    environment:
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_USERNAME:-mohitkumar2007}/vehicle-service-frontend:${IMAGE_TAG:-latest}
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped
